name: Scheduled Scraper

on:
  schedule:
    # Runs at 9am, 11am, 1pm, 3pm, 5pm, 7pm MST
    # Split into separate cron entries (rather than one comma-separated hour list) so
    # github.event.schedule can be used to identify the 7pm run and gate the
    # unlisted-returns check step to run only once a day, after the last scrape.
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'
    - cron: '0 23 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print current branch
        run: |
          echo "Current branch:" && git branch --show-current

      - name: List workspace contents
        run: |
          echo "Workspace root:" && ls -alh
          echo "App directory:" && ls -alh app || echo "app directory not found"

      - name: List workspace and app directory
        run: |
          echo "Workspace root:" && ls -alh
          echo "App directory:" && ls -alh app || echo "app directory not found"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx tsx src/utils/run-scraper-pipeline.ts

      - name: Commit updated scraped IDs
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add public/latest_scraped_ids.json
          git diff --staged --quiet || git commit -m "Update latest_scraped_ids.json from scheduled scraper"
          git push

      - name: Upload scraped IDs JSON
        uses: actions/upload-artifact@v4
        with:
          name: latest_scraped_ids
          path: public/latest_scraped_ids.json

      - name: Check for unlisted returns (adopted dogs back at shelter but not re-listed)
        if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx tsx src/utils/run-unlisted-returns-check.ts
